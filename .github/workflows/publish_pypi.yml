name: Publish to PyPI

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Build and Publish PyPI Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Build Tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build Package (Wheel and Source Distribution)
        run: |
          python -m build

      - name: Verify Build Output Directory
        run: |
          echo "=== Built Packages ==="
          ls -la dist/

      - name: Validate Package Metadata (Twine Check)
        run: |
          python -m twine check dist/*

      - name: Publish Package to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          # Only attempt to publish if token is provided to prevent workflow crash in forks
          if [ -z "${{ secrets.PYPI_API_TOKEN }}" ]; then
            echo "Error: PYPI_API_TOKEN secret is not set. Skipping PyPI upload."
            exit 1
          fi
          python -m twine upload --skip-existing dist/*
