name: Create Version Tag

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Version tag to create (e.g. v1.0.0)'
        required: true
        type: string

jobs:
  create-tag:
    name: Create Git Tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate Tag Format
        run: |
          TAG="${{ github.event.inputs.tag_name }}"
          if [[ ! $TAG =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Tag name must follow the semantic version format (e.g., v1.0.0)"
            exit 1
          fi
          echo "Validated tag format: $TAG"

      - name: Check for Duplicate Tag
        run: |
          TAG="${{ github.event.inputs.tag_name }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Error: Tag $TAG already exists in the repository!"
            exit 1
          fi
          echo "Tag $TAG does not exist yet. Safe to proceed."

      - name: Configure Git User
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create and Push Tag
        run: |
          TAG="${{ github.event.inputs.tag_name }}"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
